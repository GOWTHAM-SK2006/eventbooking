server:
  port: ${PORT:8080}
  error:
    include-message: always

spring:
  application:
    name: event-booking
  datasource:
    url: ${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5432/event_booking}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
    validate-on-migrate: false

app:
  jwt:
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970} # 256-bit hex key
    access-token-expiration-ms: 3600000 # 1 hour
    refresh-token-expiration-ms: 604800000 # 7 days
  razorpay:
    key-id: ${RAZORPAY_KEY_ID:rzp_test_T2NUwSm1uqZZrX}
    key-secret: ${RAZORPAY_KEY_SECRET:}
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
  gst-rate: ${GST_RATE:18}
  frontend-url: ${FRONTEND_URL:http://localhost:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
